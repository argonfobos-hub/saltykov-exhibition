<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Салтыков-Щедрин: Сатира на века</title>
    <style>
        /* Сброс отступов */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Georgia, serif;
            background: #f5e6d3;
            color: #3d2817;
            text-align: center;
        }
        
        /* Баннер — высота 600, ширина авто */
        .hero {
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5e6d3;
            overflow: hidden;
        }
        
        .hero img {
            height: 100%;
            width: auto;
            display: block;
        }
        
        /* Текст и кнопка */
        .intro-section {
            background: #f5e6d3;
            padding: 50px 20px;
            border-bottom: 3px solid #8b4513;
        }
        
        .intro-text {
            font-size: 3rem;
            font-style: italic;
            color: #5d2e0c;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        .cta-button {
            background: #8b4513;
            color: #f5e6d3;
            border: none;
            padding: 20px 60px;
            font-size: 1.8rem;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .cta-button:hover {
            background: #d4af37;
            color: #3d2817;
        }
        
        /* Навигация */
        .navigation {
            background: #3d2817;
            padding: 15px;
        }
        
        .navigation a {
            color: #f5e6d3;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- Баннер -->
    <header class="hero">
        <img src="banner.jpg" alt="Баннер" onerror="this.style.display='none'; document.querySelector('.hero').innerHTML='<p style=\'color:red; font-size:1.5rem\'>❌ Картинка не загрузилась. Проверьте имя файла!</p>'">
    </header>

    <!-- Текст -->
    <div class="intro-section">
        <p class="intro-text">Виртуальная выставка к юбилею великого сатирика</p>
        <button class="cta-button" onclick="document.querySelector('#biography').scrollIntoView({behavior:'smooth'})">Начать экскурсию</button>
    </div>

    <!-- Навигация -->
    <nav class="navigation">
        <a href="#biography">Биография</a>
        <a href="#works">Произведения</a>
        <a href="#quotes">Цитаты</a>
        <a href="#quiz">Тест</a>
    </nav>

    <!-- Остальной контент (заглушка) -->
    <section id="biography" style="padding:50px 20px;">
        <h2>Биография</h2>
        <p>Здесь будет контент...</p>
    </section>

</body>
</html>
